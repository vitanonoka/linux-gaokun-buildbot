name: Build Image - Fedora Gaokun3

on:
  workflow_dispatch:
    inputs:
      fedora_release:
        description: Fedora release version
        required: true
        default: "44"
      kernel_tag:
        description: Linux kernel tag
        required: true
        default: "v7.1-rc3"
      desktop_environment:
        description: Desktop environment package group (single package or group)
        required: true
        default: "@gnome-desktop"
      excluded_packages:
        description: Packages to exclude from rootfs install (comma-separated)
        required: true
        default: "gnome-boxes,gnome-connections,snapshot,gnome-weather,gnome-contacts,gnome-maps,simple-scan,gnome-clocks,gnome-calculator,gnome-calendar"
      extra_packages:
        description: Extra packages to install (space-separated)
        required: true
        default: "fcitx5-chinese-addons gnome-tweaks gnome-extensions-app telnet mpv v4l-utils vim nano ripgrep git htop fastfetch screen firefox"
      build_el2:
        description: Build and include optional -gaokun3-el2 kernel and EL2 EFI payloads
        required: true
        default: false
        type: boolean
      rebuild_package_rpms:
        description: Rebuild gaokun package RPMs before image build
        required: true
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  build-package-rpms:
    if: ${{ github.event.inputs.rebuild_package_rpms == 'true' }}
    uses: ./.github/workflows/gaokun3-package-rpms.yml
    with:
      kernel_tag: ${{ github.event.inputs.kernel_tag }}
      build_el2: ${{ github.event.inputs.build_el2 == 'true' }}
    secrets: inherit

  build-and-release:
    needs: build-package-rpms
    if: ${{ !cancelled() && (needs.build-package-rpms.result == 'success' || needs.build-package-rpms.result == 'skipped') }}
    runs-on: ubuntu-24.04-arm
    env:
      TZ: UTC
      FEDORA_RELEASE: ${{ github.event.inputs.fedora_release }}
      KERNEL_TAG: ${{ github.event.inputs.kernel_tag }}
      DESKTOP_ENVIRONMENT: ${{ github.event.inputs.desktop_environment }}
      EXCLUDED_PACKAGES: ${{ github.event.inputs.excluded_packages }}
      EXTRA_PACKAGES: ${{ github.event.inputs.extra_packages }}
      BUILD_EL2: ${{ github.event.inputs.build_el2 }}
      IMAGE_SIZE: 12G
      IMAGE_CHUNK_SIZE: 1900M
      GAOKUN_DIR: ${{ github.workspace }}
      WORKDIR: ${{ github.workspace }}/build-fedora
      ROOTFS_DIR: ${{ github.workspace }}/build-fedora/rootfs
      ARTIFACT_DIR: ${{ github.workspace }}/build-fedora/artifacts
      PACKAGE_RPMS_DIR: ${{ github.workspace }}/build-fedora/package-rpms
      IMAGE_FILE: ${{ github.workspace }}/build-fedora/fedora-${{ github.event.inputs.fedora_release }}-gaokun3.img

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install host dependencies
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            rsync kmod curl jq \
            parted dosfstools e2fsprogs btrfs-progs zstd xz-utils python3

      - name: Prepare build workspace
        run: |
          set -euxo pipefail
          mkdir -p "$WORKDIR" "$ROOTFS_DIR" "$ARTIFACT_DIR"

      - name: Resolve package release tag
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euxo pipefail

          if [[ "${{ github.event.inputs.rebuild_package_rpms }}" == "true" ]]; then
            package_release_tag="${{ needs.build-package-rpms.outputs.package_release_tag }}"
          else
            safe_kernel_tag="${KERNEL_TAG//\//-}"
            safe_kernel_tag="${safe_kernel_tag//[^A-Za-z0-9._-]/-}"
            profile="std"
            if [[ "$BUILD_EL2" == "true" ]]; then
              profile="std-el2"
            fi
            prefix="gaokun3-rpms-${safe_kernel_tag}-${profile}-"

            releases_json="$WORKDIR/releases.json"
            curl -fsSL \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}/releases?per_page=100" \
              -o "$releases_json"

            package_release_tag="$(jq -r --arg prefix "$prefix" '.[] | select(.tag_name | startswith($prefix)) | .tag_name' "$releases_json" | head -n 1)"
            if [[ -z "$package_release_tag" ]]; then
              echo "no package release found for prefix ${prefix}" >&2
              exit 1
            fi
          fi

          echo "PACKAGE_RELEASE_TAG=$package_release_tag" >> "$GITHUB_ENV"

      - name: Download gaokun package RPMs
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euxo pipefail
          mkdir -p "$PACKAGE_RPMS_DIR"

          api_url="https://api.github.com/repos/${GITHUB_REPOSITORY}/releases/tags/${PACKAGE_RELEASE_TAG}"
          release_json="$WORKDIR/package-release.json"

          curl -fsSL \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "$api_url" \
            -o "$release_json"

          asset_name="package-manifest.json"
          asset_url="$(jq -r --arg name "$asset_name" '.assets[] | select(.name == $name) | .url' "$release_json")"

          if [[ -z "$asset_url" || "$asset_url" == "null" ]]; then
            echo "missing asset ${asset_name} in release ${PACKAGE_RELEASE_TAG}" >&2
            exit 1
          fi

          curl -fsSL \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/octet-stream" \
            "$asset_url" \
            -o "$PACKAGE_RPMS_DIR/$asset_name"

          manifest_path="$PACKAGE_RPMS_DIR/package-manifest.json"
          manifest_kernel_tag="$(jq -r '.kernel_tag' "$manifest_path")"
          manifest_build_el2="$(jq -r '.build_el2' "$manifest_path")"

          if [[ "$manifest_kernel_tag" != "$KERNEL_TAG" ]]; then
            echo "package release kernel tag mismatch: expected ${KERNEL_TAG}, got ${manifest_kernel_tag}" >&2
            exit 1
          fi

          if [[ "$BUILD_EL2" == "true" && "$manifest_build_el2" != "true" ]]; then
            echo "package release ${PACKAGE_RELEASE_TAG} does not contain EL2 packages" >&2
            exit 1
          fi

          asset_names=(
            "$(jq -r '.kernels.standard.packages.kernel' "$manifest_path")"
            "$(jq -r '.kernels.standard.packages.kernel_modules' "$manifest_path")"
            "$(jq -r '.packages.firmware' "$manifest_path")"
          )

          if [[ "$BUILD_EL2" == "true" ]]; then
            asset_names+=(
              "$(jq -r '.kernels.el2.packages.kernel' "$manifest_path")"
              "$(jq -r '.kernels.el2.packages.kernel_modules' "$manifest_path")"
            )
          fi

          for asset_name in "${asset_names[@]}"; do
            asset_url="$(jq -r --arg name "$asset_name" '.assets[] | select(.name == $name) | .url' "$release_json")"

            if [[ -z "$asset_url" || "$asset_url" == "null" ]]; then
              echo "missing asset ${asset_name} in release ${PACKAGE_RELEASE_TAG}" >&2
              exit 1
            fi

            curl -fsSL \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              -H "Accept: application/octet-stream" \
              "$asset_url" \
              -o "$PACKAGE_RPMS_DIR/$asset_name"
          done

      - name: Bootstrap Fedora rootfs
        run: |
          set -euxo pipefail
          sudo docker run --rm \
            -v "$GITHUB_WORKSPACE":"$GITHUB_WORKSPACE" \
            -w "$GITHUB_WORKSPACE" \
            --user root \
            "fedora:${FEDORA_RELEASE}" \
            bash -euxo pipefail -c '
              echo "%_install_langs all" > /etc/rpm/macros.image-language-conf
              sed -i "/tsflags=nodocs/d" /etc/dnf/dnf.conf

              mkdir -p "'"$ROOTFS_DIR"'/etc"

              dnf -y --installroot="'"$ROOTFS_DIR"'" --releasever="'"$FEDORA_RELEASE"'" --forcearch=aarch64 --use-host-config \
                --exclude="'"$EXCLUDED_PACKAGES"'" \
                install \
                @core @standard "'"$DESKTOP_ENVIRONMENT"'" \
                systemd-boot-unsigned alsa-ucm \
                langpacks-en langpacks-zh_CN \
                google-noto-color-emoji-fonts google-noto-emoji-fonts \
                alsa-utils pipewire-utils \
                '"$EXTRA_PACKAGES"'

              dnf -y --installroot="'"$ROOTFS_DIR"'" --releasever="'"$FEDORA_RELEASE"'" --forcearch=aarch64 --use-host-config \
                install \
                https://download1.rpmfusion.org/free/fedora/rpmfusion-free-release-'"$FEDORA_RELEASE"'.noarch.rpm

              mkdir -p /etc/pki/rpm-gpg
              cp -a "'"$ROOTFS_DIR"'/etc/pki/rpm-gpg/." /etc/pki/rpm-gpg/

              dnf -y --installroot="'"$ROOTFS_DIR"'" --releasever="'"$FEDORA_RELEASE"'" --forcearch=aarch64 --use-host-config \
                --setopt=reposdir="'"$ROOTFS_DIR"'/etc/yum.repos.d,/etc/yum.repos.d" \
                install \
                libavcodec-freeworld
            '

      - name: Install gaokun package RPMs into rootfs
        run: |
          set -euxo pipefail
          manifest_path="$PACKAGE_RPMS_DIR/package-manifest.json"
          manifest_kernel_release="$(jq -r '.kernels.standard.release' "$manifest_path")"
          kernel_rpm_name="$(jq -r '.kernels.standard.packages.kernel' "$manifest_path")"
          kernel_modules_rpm_name="$(jq -r '.kernels.standard.packages.kernel_modules' "$manifest_path")"
          firmware_rpm_name="$(jq -r '.packages.firmware' "$manifest_path")"
          echo "$manifest_kernel_release" > "$WORKDIR/kernel-release.txt"

          el2_kernel_release=""
          el2_kernel_rpm_name=""
          el2_kernel_modules_rpm_name=""
          if [[ "$BUILD_EL2" == "true" ]]; then
            el2_kernel_release="$(jq -r '.kernels.el2.release' "$manifest_path")"
            el2_kernel_rpm_name="$(jq -r '.kernels.el2.packages.kernel' "$manifest_path")"
            el2_kernel_modules_rpm_name="$(jq -r '.kernels.el2.packages.kernel_modules' "$manifest_path")"
            echo "$el2_kernel_release" > "$WORKDIR/kernel-release-el2.txt"
          else
            rm -f "$WORKDIR/kernel-release-el2.txt"
          fi

          rpm_install_args=(
            "\"$PACKAGE_RPMS_DIR/$kernel_rpm_name\""
            "\"$PACKAGE_RPMS_DIR/$kernel_modules_rpm_name\""
            "\"$PACKAGE_RPMS_DIR/$firmware_rpm_name\""
          )
          if [[ "$BUILD_EL2" == "true" ]]; then
            rpm_install_args+=(
              "\"$PACKAGE_RPMS_DIR/$el2_kernel_rpm_name\""
              "\"$PACKAGE_RPMS_DIR/$el2_kernel_modules_rpm_name\""
            )
          fi
          rpm_install_args_string="$(printf '%s ' "${rpm_install_args[@]}")"

          sudo docker run --rm \
            -v "$(dirname "$ROOTFS_DIR")":"$(dirname "$ROOTFS_DIR")" \
            -v "$PACKAGE_RPMS_DIR":"$PACKAGE_RPMS_DIR" \
            -w / \
            --user root \
            "fedora:${FEDORA_RELEASE}" \
            bash -euxo pipefail -c '
              stock_firmware_packages=()
              rpm --root="'"$ROOTFS_DIR"'" -q atheros-firmware >/dev/null 2>&1 && stock_firmware_packages+=(atheros-firmware)
              rpm --root="'"$ROOTFS_DIR"'" -q qcom-firmware >/dev/null 2>&1 && stock_firmware_packages+=(qcom-firmware)
              if (( ${#stock_firmware_packages[@]} )); then
                rpm --root="'"$ROOTFS_DIR"'" -e --nodeps "${stock_firmware_packages[@]}"
              fi

              dnf -y --installroot="'"$ROOTFS_DIR"'" --releasever="'"$FEDORA_RELEASE"'" --use-host-config --nogpgcheck \
                install --allowerasing \
                '"$rpm_install_args_string"'
            '

          sudo depmod -b "$ROOTFS_DIR" -a "$manifest_kernel_release"
          if [[ "$BUILD_EL2" == "true" ]]; then
            sudo depmod -b "$ROOTFS_DIR" -a "$el2_kernel_release"
          fi

      - name: Create disk image and configure boot
        run: |
          chmod +x scripts/ci/50_make_image_fedora.sh
          scripts/ci/50_make_image_fedora.sh

      - name: Package image and generate release info
        id: package
        run: |
          chmod +x scripts/ci/60_package_release_fedora.sh
          scripts/ci/60_package_release_fedora.sh
          TAG_NAME="$(cat "$WORKDIR/tag-name.txt")"
          KREL="$(cat "$WORKDIR/kernel-release-export.txt")"
          PACKAGE_GLOB="$(cat "$WORKDIR/package-glob.txt")"
          RELEASE_BODY_FILE="$(cat "$WORKDIR/release-body-file.txt")"
          echo "tag_name=$TAG_NAME" >> "$GITHUB_OUTPUT"
          echo "artifact_dir=$ARTIFACT_DIR" >> "$GITHUB_OUTPUT"
          echo "kernel_release=$KREL" >> "$GITHUB_OUTPUT"
          echo "package_glob=$PACKAGE_GLOB" >> "$GITHUB_OUTPUT"
          echo "release_body_file=$RELEASE_BODY_FILE" >> "$GITHUB_OUTPUT"

      - name: Upload build artifacts (workflow)
        uses: actions/upload-artifact@v6
        with:
          name: fedora-gaokun3-build
          path: |
            ${{ steps.package.outputs.artifact_dir }}/${{ steps.package.outputs.package_glob }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2.6.1
        with:
          tag_name: ${{ steps.package.outputs.tag_name }}
          name: Fedora Linux ${{ env.FEDORA_RELEASE }} - gaokun3 - ${{ steps.package.outputs.kernel_release }}
          body_path: ${{ steps.package.outputs.artifact_dir }}/${{ steps.package.outputs.release_body_file }}
          files: |
            ${{ steps.package.outputs.artifact_dir }}/${{ steps.package.outputs.package_glob }}
