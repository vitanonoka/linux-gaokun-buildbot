name: Build Image - Ubuntu Gaokun3

on:
  workflow_dispatch:
    inputs:
      ubuntu_release:
        description: Ubuntu release version (e.g. 26.04, 24.04.4)
        required: true
        default: "26.04"
      kernel_tag:
        description: Linux kernel tag
        required: true
        default: "v7.1-rc3"
      desktop_environment:
        description: Desktop environment metapackage
        required: true
        default: "ubuntu-desktop-minimal"
      extra_packages:
        description: Extra packages to install (space-separated)
        required: true
        default: "language-pack-gnome-zh-hans fcitx5-chinese-addons gnome-tweaks gnome-shell-extension-manager mpv v4l-utils vim nano ripgrep git htop rsync mutter screen firefox"
      build_el2:
        description: Build and include optional -gaokun3-el2 kernel and EL2 EFI payloads
        required: true
        default: false
        type: boolean
      rebuild_package_debs:
        description: Rebuild gaokun package DEBs before image build
        required: true
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  build-package-debs:
    if: ${{ github.event.inputs.rebuild_package_debs == 'true' }}
    uses: ./.github/workflows/gaokun3-package-debs.yml
    with:
      kernel_tag: ${{ github.event.inputs.kernel_tag }}
      build_el2: ${{ github.event.inputs.build_el2 == 'true' }}
    secrets: inherit

  build-and-release:
    needs: build-package-debs
    if: ${{ !cancelled() && (needs.build-package-debs.result == 'success' || needs.build-package-debs.result == 'skipped') }}
    runs-on: ubuntu-24.04-arm
    env:
      TZ: UTC
      UBUNTU_RELEASE: ${{ github.event.inputs.ubuntu_release }}
      KERNEL_TAG: ${{ github.event.inputs.kernel_tag }}
      DESKTOP_ENVIRONMENT: ${{ github.event.inputs.desktop_environment }}
      EXTRA_PACKAGES: ${{ github.event.inputs.extra_packages }}
      BUILD_EL2: ${{ github.event.inputs.build_el2 }}
      IMAGE_SIZE: 12G
      IMAGE_CHUNK_SIZE: 1900M
      GAOKUN_DIR: ${{ github.workspace }}
      WORKDIR: ${{ github.workspace }}/build-ubuntu
      ROOTFS_DIR: ${{ github.workspace }}/build-ubuntu/rootfs
      ARTIFACT_DIR: ${{ github.workspace }}/build-ubuntu/artifacts
      PACKAGE_DEBS_DIR: ${{ github.workspace }}/build-ubuntu/package-debs
      IMAGE_FILE: ${{ github.workspace }}/build-ubuntu/ubuntu-${{ github.event.inputs.ubuntu_release }}-gaokun3.img

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install host dependencies
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            rsync kmod curl jq \
            parted dosfstools e2fsprogs zstd xz-utils python3

      - name: Prepare build workspace
        run: |
          set -euxo pipefail
          mkdir -p "$WORKDIR" "$ROOTFS_DIR" "$ARTIFACT_DIR"

      - name: Resolve package release tag
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euxo pipefail

          if [[ "${{ github.event.inputs.rebuild_package_debs }}" == "true" ]]; then
            package_release_tag="${{ needs.build-package-debs.outputs.package_release_tag }}"
          else
            safe_kernel_tag="${KERNEL_TAG//\//-}"
            safe_kernel_tag="${safe_kernel_tag//[^A-Za-z0-9._-]/-}"
            profile="std"
            if [[ "$BUILD_EL2" == "true" ]]; then
              profile="std-el2"
            fi
            prefix="gaokun3-debs-${safe_kernel_tag}-${profile}-"

            releases_json="$WORKDIR/releases.json"
            curl -fsSL \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}/releases?per_page=100" \
              -o "$releases_json"

            package_release_tag="$(jq -r --arg prefix "$prefix" '.[] | select(.tag_name | startswith($prefix)) | .tag_name' "$releases_json" | head -n 1)"
            if [[ -z "$package_release_tag" ]]; then
              echo "no package release found for prefix ${prefix}" >&2
              exit 1
            fi
          fi

          echo "PACKAGE_RELEASE_TAG=$package_release_tag" >> "$GITHUB_ENV"

      - name: Download gaokun package DEBs
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euxo pipefail
          mkdir -p "$PACKAGE_DEBS_DIR"

          api_url="https://api.github.com/repos/${GITHUB_REPOSITORY}/releases/tags/${PACKAGE_RELEASE_TAG}"
          release_json="$WORKDIR/package-release.json"

          curl -fsSL \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "$api_url" \
            -o "$release_json"

          asset_name="package-manifest.json"
          asset_url="$(jq -r --arg name "$asset_name" '.assets[] | select(.name == $name) | .url' "$release_json")"

          if [[ -z "$asset_url" || "$asset_url" == "null" ]]; then
            echo "missing asset ${asset_name} in release ${PACKAGE_RELEASE_TAG}" >&2
            exit 1
          fi

          curl -fsSL \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/octet-stream" \
            "$asset_url" \
            -o "$PACKAGE_DEBS_DIR/$asset_name"

          manifest_path="$PACKAGE_DEBS_DIR/package-manifest.json"
          manifest_kernel_tag="$(jq -r '.kernel_tag' "$manifest_path")"
          manifest_build_el2="$(jq -r '.build_el2' "$manifest_path")"

          if [[ "$manifest_kernel_tag" != "$KERNEL_TAG" ]]; then
            echo "package release kernel tag mismatch: expected ${KERNEL_TAG}, got ${manifest_kernel_tag}" >&2
            exit 1
          fi

          if [[ "$BUILD_EL2" == "true" && "$manifest_build_el2" != "true" ]]; then
            echo "package release ${PACKAGE_RELEASE_TAG} does not contain EL2 packages" >&2
            exit 1
          fi

          asset_names=(
            "$(jq -r '.kernels.standard.packages.image' "$manifest_path")"
            "$(jq -r '.kernels.standard.packages.modules' "$manifest_path")"
            "$(jq -r '.packages.firmware' "$manifest_path")"
          )

          if [[ "$BUILD_EL2" == "true" ]]; then
            asset_names+=(
              "$(jq -r '.kernels.el2.packages.image' "$manifest_path")"
              "$(jq -r '.kernels.el2.packages.modules' "$manifest_path")"
            )
          fi

          for raw_name in "${asset_names[@]}"; do

            # GitHub Release attachment names cannot contain '~' and are automatically replaced with '.'
            asset_name="${raw_name//\~/.}"
            
            asset_url="$(jq -r --arg name "$asset_name" '.assets[] | select(.name == $name) | .url' "$release_json")"

            if [[ -z "$asset_url" || "$asset_url" == "null" ]]; then
              echo "missing asset ${asset_name} in release ${PACKAGE_RELEASE_TAG} (original name: ${raw_name})" >&2
              exit 1
            fi

            curl -fsSL \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              -H "Accept: application/octet-stream" \
              "$asset_url" \
              -o "$PACKAGE_DEBS_DIR/$raw_name"
          done

      - name: Bootstrap Ubuntu rootfs
        run: |
          set -euxo pipefail
          cleanup() {
            set +e
            sudo umount "$ROOTFS_DIR/dev/pts" 2>/dev/null || true
            sudo umount "$ROOTFS_DIR/dev" 2>/dev/null || true
            sudo umount "$ROOTFS_DIR/proc" 2>/dev/null || true
            sudo umount "$ROOTFS_DIR/sys" 2>/dev/null || true
            sudo umount "$ROOTFS_DIR/run" 2>/dev/null || true
            sudo rm -f "$ROOTFS_DIR/etc/resolv.conf"
            sudo mv "$ROOTFS_DIR/etc/resolv.conf.bak" "$ROOTFS_DIR/etc/resolv.conf"
          }
          trap cleanup EXIT

          # Download and extract ubuntu-base as rootfs foundation
          UBUNTU_BASE_URL="https://cdimages.ubuntu.com/ubuntu-base/releases/${UBUNTU_RELEASE}/release/ubuntu-base-${UBUNTU_RELEASE}-base-arm64.tar.gz"
          UBUNTU_BASE_BETA_URL="https://cdimages.ubuntu.com/ubuntu-base/releases/${UBUNTU_RELEASE}/beta/ubuntu-base-${UBUNTU_RELEASE}-beta-base-arm64.tar.gz"
          UBUNTU_BASE_TAR="$WORKDIR/ubuntu-base-arm64.tar.gz"

          if ! curl -fsSL -o "$UBUNTU_BASE_TAR" "$UBUNTU_BASE_URL"; then
            echo "Release tarball not found, trying beta..."
            curl -fsSL -o "$UBUNTU_BASE_TAR" "$UBUNTU_BASE_BETA_URL"
          fi

          sudo tar -xzf "$UBUNTU_BASE_TAR" -C "$ROOTFS_DIR"

          sudo mv "$ROOTFS_DIR/etc/resolv.conf" "$ROOTFS_DIR/etc/resolv.conf.bak"
          sudo cp /run/systemd/resolve/resolv.conf "$ROOTFS_DIR/etc/resolv.conf"

          sudo mount --bind /dev "$ROOTFS_DIR/dev"
          sudo mount --bind /dev/pts "$ROOTFS_DIR/dev/pts"
          sudo mount -t proc proc "$ROOTFS_DIR/proc"
          sudo mount -t sysfs sys "$ROOTFS_DIR/sys"
          sudo mount -t tmpfs tmpfs "$ROOTFS_DIR/run"

          sudo chroot "$ROOTFS_DIR" /usr/bin/env UBUNTU_RELEASE="$UBUNTU_RELEASE" /bin/bash -euxo pipefail -c '
            export DEBIAN_FRONTEND=noninteractive

            apt-get update
            apt-get install -y locales
            sed -i "s/# zh_CN.UTF-8/zh_CN.UTF-8/" /etc/locale.gen
            locale-gen
            update-locale LANG=zh_CN.UTF-8 LANGUAGE=zh_CN:en_US:en LC_MESSAGES=zh_CN.UTF-8

            apt-get install -y \
              linux-base initramfs-tools kmod

            apt-get install -y --no-install-recommends \
              systemd-boot systemd-boot-efi

            # Base system tools (not user-configurable)
            apt-get install -y \
              iputils-ping iproute2 net-tools dnsutils traceroute \
              xz-utils unzip zip bzip2 zstd p7zip-full \
              wget curl ca-certificates gnupg lsb-release \
              ssh less file sudo

            install -d -m 0755 /etc/apt/keyrings
            wget -qO- https://packages.mozilla.org/apt/repo-signing-key.gpg | \
              gpg --dearmor -o /etc/apt/keyrings/packages.mozilla.org.gpg

            printf "%s\n" \
              "deb [signed-by=/etc/apt/keyrings/packages.mozilla.org.gpg] https://packages.mozilla.org/apt mozilla main" \
              > /etc/apt/sources.list.d/mozilla.list

            printf "%s\n" \
              "Package: *" \
              "Pin: origin packages.mozilla.org" \
              "Pin-Priority: 1000" \
              > /etc/apt/preferences.d/mozilla

            apt-get update

            apt-get install -y \
              '"$DESKTOP_ENVIRONMENT"' \
              fonts-noto-cjk fonts-noto-color-emoji \
              gstreamer1.0-libav gstreamer1.0-plugins-ugly \
              alsa-utils pipewire-alsa \
              '"$EXTRA_PACKAGES"'

            if dpkg --compare-versions "${UBUNTU_RELEASE}" gt "25.10"; then
                # We use ptyxis instead of gnome-terminal
                apt purge --auto-remove -y gnome-terminal
            fi
            apt-get clean
          '

          cleanup
          trap - EXIT

      - name: Install gaokun package DEBs into rootfs
        run: |
          set -euxo pipefail
          manifest_path="$PACKAGE_DEBS_DIR/package-manifest.json"
          manifest_kernel_release="$(jq -r '.kernels.standard.release' "$manifest_path")"
          image_deb_name="$(jq -r '.kernels.standard.packages.image' "$manifest_path")"
          modules_deb_name="$(jq -r '.kernels.standard.packages.modules' "$manifest_path")"
          firmware_deb_name="$(jq -r '.packages.firmware' "$manifest_path")"
          echo "$manifest_kernel_release" > "$WORKDIR/kernel-release.txt"

          el2_kernel_release=""
          el2_image_deb_name=""
          el2_modules_deb_name=""
          if [[ "$BUILD_EL2" == "true" ]]; then
            el2_kernel_release="$(jq -r '.kernels.el2.release' "$manifest_path")"
            el2_image_deb_name="$(jq -r '.kernels.el2.packages.image' "$manifest_path")"
            el2_modules_deb_name="$(jq -r '.kernels.el2.packages.modules' "$manifest_path")"
            echo "$el2_kernel_release" > "$WORKDIR/kernel-release-el2.txt"
          else
            rm -f "$WORKDIR/kernel-release-el2.txt"
          fi

          # Install DEBs directly into the rootfs using dpkg
          sudo cp "$PACKAGE_DEBS_DIR/$image_deb_name" "$ROOTFS_DIR/tmp/"
          sudo cp "$PACKAGE_DEBS_DIR/$modules_deb_name" "$ROOTFS_DIR/tmp/"
          sudo cp "$PACKAGE_DEBS_DIR/$firmware_deb_name" "$ROOTFS_DIR/tmp/"
          if [[ "$BUILD_EL2" == "true" ]]; then
            sudo cp "$PACKAGE_DEBS_DIR/$el2_image_deb_name" "$ROOTFS_DIR/tmp/"
            sudo cp "$PACKAGE_DEBS_DIR/$el2_modules_deb_name" "$ROOTFS_DIR/tmp/"
          fi

          sudo mount --bind /dev "$ROOTFS_DIR/dev"
          sudo mount --bind /dev/pts "$ROOTFS_DIR/dev/pts"
          sudo mount -t proc proc "$ROOTFS_DIR/proc"
          sudo mount -t sysfs sys "$ROOTFS_DIR/sys"
          sudo mount -t tmpfs tmpfs "$ROOTFS_DIR/run"

          chroot_debs="/tmp/$image_deb_name /tmp/$modules_deb_name /tmp/$firmware_deb_name"
          if [[ "$BUILD_EL2" == "true" ]]; then
            chroot_debs="$chroot_debs /tmp/$el2_image_deb_name /tmp/$el2_modules_deb_name"
          fi

          sudo chroot "$ROOTFS_DIR" /bin/bash -euxo pipefail -c '
            dpkg -i '"$chroot_debs"'
            rm -f /tmp/*.deb
            depmod -a '"$manifest_kernel_release"'
            '"$(if [[ "$BUILD_EL2" == "true" ]]; then printf 'depmod -a %q\n' "$el2_kernel_release"; fi)"'
          '

          sudo umount "$ROOTFS_DIR/dev/pts"
          sudo umount "$ROOTFS_DIR/dev"
          sudo umount "$ROOTFS_DIR/proc"
          sudo umount "$ROOTFS_DIR/sys"
          sudo umount "$ROOTFS_DIR/run"

      - name: Create disk image and configure boot
        run: |
          chmod +x scripts/ci/50_make_image_ubuntu.sh
          scripts/ci/50_make_image_ubuntu.sh

      - name: Package image and generate release info
        id: package
        run: |
          chmod +x scripts/ci/60_package_release_ubuntu.sh
          scripts/ci/60_package_release_ubuntu.sh
          TAG_NAME="$(cat "$WORKDIR/tag-name.txt")"
          KREL="$(cat "$WORKDIR/kernel-release-export.txt")"
          PACKAGE_GLOB="$(cat "$WORKDIR/package-glob.txt")"
          RELEASE_BODY_FILE="$(cat "$WORKDIR/release-body-file.txt")"
          echo "tag_name=$TAG_NAME" >> "$GITHUB_OUTPUT"
          echo "artifact_dir=$ARTIFACT_DIR" >> "$GITHUB_OUTPUT"
          echo "kernel_release=$KREL" >> "$GITHUB_OUTPUT"
          echo "package_glob=$PACKAGE_GLOB" >> "$GITHUB_OUTPUT"
          echo "release_body_file=$RELEASE_BODY_FILE" >> "$GITHUB_OUTPUT"

      - name: Upload build artifacts (workflow)
        uses: actions/upload-artifact@v6
        with:
          name: ubuntu-gaokun3-build
          path: |
            ${{ steps.package.outputs.artifact_dir }}/${{ steps.package.outputs.package_glob }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2.6.1
        with:
          tag_name: ${{ steps.package.outputs.tag_name }}
          name: Ubuntu ${{ env.UBUNTU_RELEASE }} - gaokun3 - ${{ steps.package.outputs.kernel_release }}
          body_path: ${{ steps.package.outputs.artifact_dir }}/${{ steps.package.outputs.release_body_file }}
          files: |
            ${{ steps.package.outputs.artifact_dir }}/${{ steps.package.outputs.package_glob }}
