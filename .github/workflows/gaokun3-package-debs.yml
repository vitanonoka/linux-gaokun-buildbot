name: Build Package - DEBs Gaokun3

on:
  workflow_dispatch:
    inputs:
      kernel_tag:
        description: Linux kernel tag
        required: true
        default: "v7.1-rc3"
      build_el2:
        description: Build extra -gaokun3-el2 kernel packages
        required: true
        default: false
        type: boolean
  workflow_call:
    inputs:
      kernel_tag:
        description: Linux kernel tag
        required: true
        type: string
      build_el2:
        description: Build extra -gaokun3-el2 kernel packages
        required: false
        default: false
        type: boolean
    outputs:
      package_release_tag:
        description: Release tag containing the generated package bundle
        value: ${{ jobs.build-package-debs.outputs.package_release_tag }}

permissions:
  contents: write

jobs:
  build-package-debs:
    outputs:
      package_release_tag: ${{ steps.release_meta.outputs.package_release_tag }}
    runs-on: ubuntu-24.04-arm
    env:
      TZ: UTC
      KERNEL_TAG: ${{ inputs.kernel_tag || github.event.inputs.kernel_tag }}
      BUILD_EL2: ${{ inputs.build_el2 || github.event.inputs.build_el2 || 'false' }}
      GAOKUN_DIR: ${{ github.workspace }}
      WORKDIR: ${{ github.workspace }}/build-packages
      KERN_SRC: ${{ github.workspace }}/build-packages/mainline-linux
      KERN_SRC_BASE: ${{ github.workspace }}/build-packages/mainline-linux-base
      KERN_OUT: ${{ github.workspace }}/build-packages/kernel-out
      KERN_SRC_EL2: ${{ github.workspace }}/build-packages/mainline-linux
      KERN_OUT_EL2: ${{ github.workspace }}/build-packages/kernel-out-el2
      ARTIFACT_DIR: ${{ github.workspace }}/build-packages/artifacts

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Checkout Linux source
        uses: actions/checkout@v6
        with:
          repository: torvalds/linux
          ref: ${{ env.KERNEL_TAG }}
          fetch-depth: 1
          path: build-packages/mainline-linux

      - name: Install host dependencies
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            git make gcc bc bison flex cpio rsync kmod \
            libssl-dev libelf-dev dwarves ccache dpkg-dev

      - name: Resolve package release tag
        id: release_meta
        run: |
          set -euxo pipefail
          safe_kernel_tag="${KERNEL_TAG//\//-}"
          safe_kernel_tag="${safe_kernel_tag//[^A-Za-z0-9._-]/-}"
          profile="std"
          if [[ "$BUILD_EL2" == "true" ]]; then
            profile="std-el2"
          fi
          package_release_tag="gaokun3-debs-${safe_kernel_tag}-${profile}-$(date -u +%Y%m%d%H%M%S)"

          echo "package_release_tag=$package_release_tag" >> "$GITHUB_OUTPUT"
          echo "PACKAGE_RELEASE_TAG=$package_release_tag" >> "$GITHUB_ENV"

      - name: Restore ccache
        uses: actions/cache@v5
        with:
          path: ~/.ccache
          key: gaokun3-packages-deb-ccache-${{ env.KERNEL_TAG }}-${{ env.BUILD_EL2 }}-${{ hashFiles('patches/*.patch', 'patches/el2/*.patch', 'defconfig/**', 'dts/**', 'drivers/**', 'packaging/**', 'firmware/**', 'scripts/ci/*.sh', '.github/workflows/gaokun3-package-debs.yml') }}
          restore-keys: |
            gaokun3-packages-deb-ccache-${{ env.KERNEL_TAG }}-
            gaokun3-packages-deb-ccache-

      - name: Build gaokun kernel variants
        run: |
          set -euxo pipefail
          mkdir -p "$WORKDIR" "$ARTIFACT_DIR"
          chmod +x scripts/ci/20_build_kernel_variants.sh
          scripts/ci/20_build_kernel_variants.sh

      - name: Build DEB packages
        run: |
          chmod +x scripts/ci/70_build_package_debs.sh
          scripts/ci/70_build_package_debs.sh

      - name: Upload build artifacts (workflow)
        uses: actions/upload-artifact@v6
        with:
          name: gaokun3-package-debs
          path: |
            ${{ env.ARTIFACT_DIR }}/*.deb
            ${{ env.ARTIFACT_DIR }}/package-manifest.json
            ${{ env.ARTIFACT_DIR }}/package-release-body.md

      - name: Publish package release
        uses: softprops/action-gh-release@v2.6.1
        with:
          tag_name: ${{ steps.release_meta.outputs.package_release_tag }}
          name: gaokun3 package DEBs - ${{ env.KERNEL_TAG }}${{ env.BUILD_EL2 == 'true' && ' + EL2' || '' }}
          body_path: ${{ env.ARTIFACT_DIR }}/package-release-body.md
          prerelease: false
          make_latest: false
          append_body: false
          overwrite_files: true
          files: |
            ${{ env.ARTIFACT_DIR }}/*.deb
            ${{ env.ARTIFACT_DIR }}/package-manifest.json
